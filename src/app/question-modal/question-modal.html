@if (visible) {
  <div class="modal-backdrop">
    <div class="modal">
      <h3>{{ question?.text }}</h3>
      <ul>
        @for (opt of question?.options ?? []; track $index) {
          <li>
            <button [class]="getButtonClass($index)" (click)="selectOption($index)">
              {{ opt }}
            </button>
          </li>
        }
      </ul>
    </div>
  </div>
}
