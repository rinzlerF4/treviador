<app-question-modal
  [question]="currentQuestion"
  [visible]="modalVisible"
  (answer)="onAnswer($event)"
></app-question-modal>

<div class="grid-container">
  <div class="grid" [style.gridTemplateColumns]="'repeat(' + GRID_SIZE + ', 1fr)'">
    @for (cell of cells(); track cell) {
      <app-game-cell
        [cellId]="cell"
        [gridSize]="GRID_SIZE"
        [isCaptured]="isCellCaptured(cell)"
        (cellClicked)="onCellClick(cell)"
      ></app-game-cell>
    }
  </div>
</div>
